<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ 檔案已銷毀</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            color: #ff3333;
            text-shadow: 0 0 15px #ff0000;
            margin-bottom: 20px;
            animation: glitch 0.5s infinite;
        }

        p {
            font-size: 1.5rem;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .warning {
            font-size: 1.2rem;
            color: #aaaaaa;
            line-height: 1.8;
            max-width: 80%;
            margin: 0 auto;
            border: 1px dashed #555;
            padding: 20px;
            background: rgba(255, 0, 0, 0.05);
        }

        .warning span {
            color: #ffcc00;
            font-weight: bold;
        }

        /* Explosion sequence animation */
        .explosion-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, #ffffff 0%, #ffaa00 30%, #ff0000 60%, rgba(0,0,0,0) 100%);
            animation: explode 2.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            z-index: 100;
            pointer-events: none;
        }

        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            animation: whiteFlash 2.5s forwards;
            z-index: 99;
            pointer-events: none;
        }

        @keyframes explode {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            15% {
                width: 200vw;
                height: 200vh;
                opacity: 1;
            }
            100% {
                width: 300vw;
                height: 300vh;
                opacity: 0;
                display: none;
            }
        }

        @keyframes whiteFlash {
            0% { opacity: 0; }
            5% { opacity: 1; }
            15% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-3px, 3px) }
            40% { transform: translate(-3px, -3px) }
            60% { transform: translate(3px, 3px) }
            80% { transform: translate(3px, -3px) }
            100% { transform: translate(0) }
        }

        /* Content reveals after explosion */
        .content-reveal {
            opacity: 0;
            animation: fadeIn 1s forwards;
            animation-delay: 2s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="explosion-overlay"></div>
    <div class="flash"></div>

    <div class="container content-reveal">
        <h1>⚠️ 檔案已銷毀 ⚠️</h1>
        <p>[ MISSION ACCOMPLISHED ]</p>
        <div class="warning">
            基於 <span>著作權法</span> 保護原則<br>
            期末考 KTV 伴唱檔案已於考試結束後自動啟動銷毀程序。<br>
            所有音檔與歌詞紀錄均已徹底抹除。<br><br>
            感謝您的使用，江湖再見！
        </div>
    </div>
</body>
</html>
