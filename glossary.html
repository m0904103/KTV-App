<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>解釋名詞大挑戰 KTV - 人際關係與協商</title>
    <style>
        :root {
            --primary: #ff007f;
            --bg-color: #0d0d12;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            height: 100vh;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #2e1a26 0%, var(--bg-color) 70%);
        }

        header {
            width: 100%;
            padding: 15px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .header-title {
            text-align: left;
            flex: 1;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #ff007f, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-left: 10px;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            width: 100%;
            padding: 15px;
            gap: 15px;
            overflow: hidden;
        }

        .player-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .video-container {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            background: #000;
        }

        audio {
            width: 100%;
            display: block;
            outline: none;
        }

        audio::-webkit-media-controls-enclosure {
            border-radius: 0;
            background-color: rgba(255,255,255,0.1);
        }

        .control-panel {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            flex: 1;
            background: #ff8c00;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-action:active {
            transform: scale(0.98);
        }

        .btn-sync {
            flex: 0.5;
            background: #444;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .lyrics-section {
            flex: 1;
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .lyrics-container {
            flex: 1;
            overflow-y: auto;
            padding: 50% 20px; 
            scroll-behavior: smooth;
        }

        .lyrics-container::-webkit-scrollbar {
            display: none; 
        }

        .lyric-line {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.3);
            margin: 15px 0;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            line-height: 1.5;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .lyric-line.active {
            color: #fff;
            font-size: 1.4rem;
            font-weight: bold;
            text-shadow: 0 0 15px var(--primary), 0 0 30px var(--primary);
            transform: scale(1.05);
        }

        .lyric-line.syncing {
            color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
        }

        /* Sync Mode Overlay */
        #syncOverlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .tap-area {
            width: 100%;
            height: 200px;
            background: rgba(255,0,127,0.3);
            border: 2px dashed #ff007f;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .tap-area:active {
            background: rgba(255,0,127,0.6);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>名詞解釋大挑戰 KTV</h1>
        </div>
        <div>
            <a href="index.html" class="nav-btn">🎵 問答題篇</a>
        </div>
    </header>

    <div class="main-container">
        <div class="player-section">
            <div class="video-container">
                <audio id="audioPlayer" controls playsinline>
                    <source src="名詞解釋大挑戰.wav" type="audio/wav">
                    您的瀏覽器不支援音樂播放。
                </audio>
            </div>
            <div class="control-panel">
                <button id="btnSkipIntro" class="btn-action">🎤 直接開唱</button>
                <button id="btnOpenSync" class="btn-sync">⏱️ 錄製時間軸</button>
            </div>
        </div>

        <div class="lyrics-section">
            <div class="lyrics-container" id="lyricsContainer">
                <!-- Lyrics injected here -->
            </div>
            
            <div id="syncOverlay">
                <h2 style="color: #00ffcc; margin-bottom: 10px;">時間軸校正模式</h2>
                <p style="color: #ccc; font-size: 0.9rem; margin-bottom: 20px;">
                    請點擊下方紅色區塊或按【空白鍵】，當歌手唱到「發綠光」的那一行時就按一下！
                </p>
                <button id="btnStartSync" style="padding: 10px 20px; background: #00ffcc; color: black; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px;">▶️ 開始音樂並錄製</button>
                <button id="btnCancelSync" style="padding: 10px 20px; background: #444; color: white; border: none; border-radius: 8px;">取消</button>
                
                <div id="tapArea" class="tap-area">
                    👆 點這裡打節拍！
                </div>
            </div>
        </div>
    </div>

    <script>
        const initialLyrics = [
            { time: null, text: "Ooh... 接下來，我們針對解釋名詞～" },
            { time: null, text: "這些魔王題，你一定要記熟～" },
            { time: null, text: "跟著我的節奏背下來，我們現在就開始吧..." },
            { time: null, text: "名詞一，人際衝突" },
            { time: null, text: "人跟人在互動之中，有著利益上的不同，或是出現相反的意見。" },
            { time: null, text: "名詞二，切片" },
            { time: null, text: "將簡單的事情複雜化，去增加溝通的困難性，以爭取對他有利的條件。" },
            { time: null, text: "名詞三，刻板印象" },
            { time: null, text: "對於特定群體，或是事物固定的看法。" },
            { time: null, text: "名詞四，雙人垂直聯結關係模式 V D L" },
            { time: null, text: "是主管與部屬之間建立的，圈內人與圈外人的關係。" },
            { time: null, text: "名詞五，銘印現象" },
            { time: null, text: "人們到職的第一年，在自己面前展開的工作場所景象的每一件事，" },
            { time: null, text: "在其後也將會保留下去的特徵。" },
            { time: null, text: "這一些最初的經驗，往往會去影響他們未來對工作的態度與適應方式。" },
            { time: null, text: "名詞六，越界角色" },
            { time: null, text: "扮演著跨越組織邊界，對內與對外溝通的橋樑角色。" },
            { time: null, text: "名詞七，生涯規劃" },
            { time: null, text: "用來在工作之中成長，並且得到滿足的有計畫步驟。" },
            { time: null, text: "名詞八，非典型聘雇關係" },
            { time: null, text: "它指涉及一種非全時、非長期受聘雇於某一個雇主，" },
            { time: null, text: "或者一家企業的契約勞動，以及許多不同類型的工作型態。" },
            { time: null, text: "名詞九，E Q" },
            { time: null, text: "代表著一個人在情緒方面的管理，以及應用上的整體能力。" },
            { time: null, text: "名詞十，自我潛能開發" },
            { time: null, text: "經由對自身去思考問題、與解決問題能力的培養和訓練，" },
            { time: null, text: "抱持著努力不懈的堅韌毅力，" },
            { time: null, text: "去達到創造成功人生的另一種途徑。" },
            { time: null, text: "這十題解釋名詞，你都印在腦海裡了嗎～" },
            { time: null, text: "反覆聽幾遍，期末考..." },
            { time: null, text: "讓我們一起 All Pass！" },
            { time: null, text: "All Pass！一起高分過關～ Oh Yeah～" }
        ];

        let lyrics = [];
        let activeIndex = -1;
        let isSyncing = false;
        let currentSyncIndex = 0;

        const player = document.getElementById('audioPlayer');
        const container = document.getElementById('lyricsContainer');
        const syncOverlay = document.getElementById('syncOverlay');
        const tapArea = document.getElementById('tapArea');

        function loadLyrics() {
            const saved = localStorage.getItem('karaoke_glossary_sync_v1');
            if (saved) {
                lyrics = JSON.parse(saved);
            } else {
                lyrics = JSON.parse(JSON.stringify(initialLyrics));
                for(let i=0; i<lyrics.length; i++) {
                    lyrics[i].time = 9999; 
                }
            }
            renderLyrics();
        }

        function saveLyrics() {
            localStorage.setItem('karaoke_glossary_sync_v1', JSON.stringify(lyrics));
        }

        function renderLyrics() {
            container.innerHTML = '';
            lyrics.forEach((line, index) => {
                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.id = `line-${index}`;
                div.textContent = line.text;
                
                div.addEventListener('click', () => {
                    if (!isSyncing && line.time !== null && line.time !== 9999) {
                        player.currentTime = line.time;
                        player.play();
                    }
                });
                
                container.appendChild(div);
            });
        }

        function updateLyricsHighlight(currentTime) {
            if (isSyncing) return;
            let newActiveIndex = -1;
            for (let i = 0; i < lyrics.length; i++) {
                if (currentTime >= lyrics[i].time) {
                    newActiveIndex = i;
                } else {
                    break;
                }
            }

            if (newActiveIndex !== activeIndex && newActiveIndex !== -1) {
                if (activeIndex !== -1) {
                    const oldEl = document.getElementById(`line-${activeIndex}`);
                    if (oldEl) oldEl.classList.remove('active');
                }
                activeIndex = newActiveIndex;
                const activeEl = document.getElementById(`line-${activeIndex}`);
                if (activeEl) {
                    activeEl.classList.add('active');
                    activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        player.addEventListener('timeupdate', () => {
            if (!isSyncing) {
                updateLyricsHighlight(player.currentTime);
            }
        });

        // Skip Intro Button
        document.getElementById('btnSkipIntro').addEventListener('click', () => {
            if (lyrics[0] && lyrics[0].time !== 9999) {
                player.currentTime = Math.max(0, lyrics[0].time - 0.5);
                player.play();
            } else {
                alert("您還沒有錄製時間軸！請點擊『⏱️ 錄製時間軸』自己打節拍喔！");
            }
        });

        // --- Sync Mode Logic ---
        document.getElementById('btnOpenSync').addEventListener('click', () => {
            syncOverlay.style.display = 'flex';
        });

        document.getElementById('btnCancelSync').addEventListener('click', () => {
            endSync();
        });

        document.getElementById('btnStartSync').addEventListener('click', () => {
            startSync();
        });

        function startSync() {
            isSyncing = true;
            currentSyncIndex = 0;
            document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active', 'syncing'));
            
            const targetEl = document.getElementById(`line-${currentSyncIndex}`);
            if(targetEl) {
                targetEl.classList.add('syncing');
                targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            player.currentTime = 0;
            player.play();
            document.getElementById('btnStartSync').textContent = '重新開始';
        }

        function endSync() {
            isSyncing = false;
            syncOverlay.style.display = 'none';
            player.pause();
            document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('syncing'));
            saveLyrics();
        }

        function registerTap(e) {
            if (e) e.preventDefault();
            if (!isSyncing) return;
            
            if (currentSyncIndex < lyrics.length) {
                lyrics[currentSyncIndex].time = player.currentTime;
                
                const currEl = document.getElementById(`line-${currentSyncIndex}`);
                if(currEl) currEl.classList.remove('syncing');
                
                currentSyncIndex++;
                
                if (currentSyncIndex < lyrics.length) {
                    const nextEl = document.getElementById(`line-${currentSyncIndex}`);
                    if(nextEl) {
                        nextEl.classList.add('syncing');
                        nextEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    alert('✅ 錄製完成！為您存檔。');
                    endSync();
                }
            }
        }

        tapArea.addEventListener('touchstart', registerTap);
        tapArea.addEventListener('mousedown', registerTap);
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && isSyncing) {
                e.preventDefault();
                registerTap();
            }
        });

        loadLyrics();

    </script>
</body>
</html>
